version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-haushalt}
      POSTGRES_USER: ${POSTGRES_USER:-haushalt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-haushalt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-haushalt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-haushalt}
      HOUSEHOLD_PASSWORD: ${HOUSEHOLD_PASSWORD}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "40501:40501"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 40501 --reload

volumes:
  postgres_data:
